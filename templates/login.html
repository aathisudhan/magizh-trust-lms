{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper fade-in-up">
    <div class="auth-card">
        <div class="auth-header">
            <div class="google-logo-dots">
                <span class="dot blue"></span>
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <h2>Sign in</h2>
            <p>Use your Magizh Trust Account</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required autocomplete="username">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
            </div>
            
            <div class="auth-footer">
                <a href="{{ url_for('register') }}" class="text-link">Create account</a>
                <button type="submit" id="loginBtn" class="primary-btn ripple">
                    <span class="btn-text">Next</span>
                    <div class="spinner-small hidden"></div>
                </button>
            </div>
        </form>
    </div>
    
    <div id="errorMessage" class="error-toast hidden"></div>
</div>



<style>
    .auth-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
    }

    .auth-card {
        width: 100%;
        max-width: 450px;
        padding: 48px 40px 36px;
        border: 1px solid #dadce0;
        border-radius: 8px;
        background: #fff;
        text-align: center;
    }

    .auth-header h2 {
        font-size: 24px;
        font-weight: 400;
        color: #202124;
        margin: 10px 0;
    }

    .auth-header p {
        font-size: 16px;
        color: #202124;
        margin-bottom: 40px;
    }

    .google-logo-dots {
        display: flex;
        justify-content: center;
        gap: 5px;
        margin-bottom: 10px;
    }

    .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }
    .blue { background: #4285F4; }
    .red { background: #EA4335; }
    .yellow { background: #FBBC05; }
    .green { background: #34A853; }

    .input-group {
        margin-bottom: 10px;
    }

    input {
        width: 100%;
        padding: 13px 15px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        font-size: 16px;
        transition: border 0.2s, box-shadow 0.2s;
    }

    input:focus {
        border-color: #1a73e8;
        outline: none;
        box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
    }

    .auth-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 40px;
    }

    .text-link {
        color: #1a73e8;
        font-weight: 500;
        text-decoration: none;
        font-size: 14px;
    }

    .text-link:hover { text-decoration: underline; }

    .error-toast {
        margin-top: 20px;
        padding: 10px 20px;
        background: #d93025;
        color: white;
        border-radius: 4px;
        font-size: 14px;
        animation: shake 0.4s;
    }

    .hidden { display: none; }

    /* Loading Spinner */
    .spinner-small {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top: 2px solid #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }
</style>

<script>
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('loginBtn');
        const btnText = loginBtn.querySelector('.btn-text');
        const spinner = loginBtn.querySelector('.spinner-small');
        const errorBox = document.getElementById('errorMessage');

        // UI Loading State
        loginBtn.disabled = true;
        btnText.classList.add('hidden');
        spinner.classList.remove('hidden');
        errorBox.classList.add('hidden');

        try {
            // 1. Firebase Client-side Auth
            const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
            const idToken = await userCredential.user.getIdToken();

            // 2. Synchronize with Flask Session
            const response = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ idToken })
            });

            const data = await response.json();
            
            if (data.status === 'success') {
                // Smooth redirect based on role
                window.location.href = '/' + data.role;
            } else {
                throw new Error(data.message || "Backend sync failed");
            }
        } catch (error) {
            loginBtn.disabled = false;
            btnText.classList.remove('hidden');
            spinner.classList.add('hidden');
            
            errorBox.textContent = error.message;
            errorBox.classList.remove('hidden');
        }
    };
</script>
{% endblock %}
