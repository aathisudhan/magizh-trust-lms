<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magizh Trust LMS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        /* Navbar specific styles to ensure it matches the Google theme */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #dadce0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-logo {
            font-weight: 700;
            color: #1a73e8;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }
        .nav-links a {
            text-decoration: none;
            color: #5f6368;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #1a73e8;
        }
        .container {
            padding: 40px 5%;
            max-width: 1200px;
            margin: auto;
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <nav class="navbar">
        <div class="nav-logo">MAGIZH TRUST</div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}">Home</a>
            {% if session.get('user') %}
                {% if session['user']['role'] == 'admin' %}
                    <a href="{{ url_for('user.admin_portal') }}">Admin Panel</a>
                {% elif session['user']['role'] == 'mentor' %}
                    <a href="{{ url_for('user.mentor_panel') }}">Mentor Space</a>
                {% else %}
                    <a href="{{ url_for('user.student_dashboard') }}">My Dashboard</a>
                {% endif %}
                <a href="{{ url_for('logout') }}" style="color: #ea4335;">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}">Login</a>
                <a href="{{ url_for('register') }}" class="primary-btn" style="color: white; padding: 8px 16px;">Join Now</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>

    <script>
        // Global logic for session handling if needed
        console.log("Magizh Trust LMS Base Template Loaded.");
    </script>
</body>
</html>
