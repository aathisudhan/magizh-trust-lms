{% extends "base.html" %}
{% block content %}
<div class="admin-panel">
    <h1>System Administration</h1>
    <div class="stats-row">
        <div class="stat-card">Users: <span id="userCount">0</span></div>
        <div class="stat-card">Active Courses: <span id="courseCount">0</span></div>
    </div>
    
    <table class="user-table">
        <thead>
            <tr>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="userTableBody"></tbody>
    </table>
</div>
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
{% endblock %}
