<!DOCTYPE html>
<html>
<head>
  <title>Register - MAGIZH TRUST</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="center-card">
  <h2>Student Registration</h2>

  <select id="grade">
    <option value="6">Grade 6</option>
    <option value="7">Grade 7</option>
    <option value="8">Grade 8</option>
    <option value="9">Grade 9</option>
    <option value="10">Grade 10</option>
    <option value="11">Grade 11</option>
    <option value="12">Grade 12</option>
  </select>

  <br><br>

  <button onclick="registerWithGoogle()" class="primary-btn">
    Register with Google
  </button>

  <p>Admin approval required</p>

  <a href="index.html">Back</a>
</div>

<script type="module">
import { auth, db } from "./js/firebase-config.js";
import { GoogleAuthProvider, signInWithPopup }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { ref, set }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

window.registerWithGoogle = async function() {
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  const user = result.user;
  const grade = document.getElementById("grade").value;

  await set(ref(db, "users/" + user.uid), {
    name: user.displayName,
    email: user.email,
    role: "student",
    grade: parseInt(grade),
    approved: false
  });

  alert("Registered successfully! Wait for admin approval.");
}
</script>

</body>
</html>
